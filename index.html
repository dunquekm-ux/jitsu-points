// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

  const palette = colors || ['#FF4F8B','#FFD23F','#3BCEAC','#4DA8FF','#FF8C42','#9B4DCA'];
  // deterministic pseudo-random
  const rand = (i) => {
    const x = Math.sin((i + 1 + seed) * 9999.7) * 10000;
    return x - Math.floor(x);
  };
  const pieces = Array.from({ length: count }, (_, i) => {
    const c = palette[Math.floor(rand(i) * palette.length)];
    const x = rand(i + 100) * 100;
    const y = rand(i + 200) * 100;
    const r = (rand(i + 300) - 0.5) * 80;
    const shape = Math.floor(rand(i + 400) * 3);
    const size = 6 + rand(i + 500) * 10;
    return { c, x, y, r, shape, size };
  });
  return (
    <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none', overflow: 'hidden' }}>

        <div key={i} style={{

  <script type="text/babel" data-presets="react">
// Live interactive prototype — single phone frame, real navigation between screens.
// Reuses tokens/mascot/primitives. Screens are written stateful here so taps actually flow.

const { useState, useEffect, useRef } = React;

// ─────────────────────────────────────────────────────────────
// App state + router
// ─────────────────────────────────────────────────────────────
function makeInitialState() {
  return {
    screen: 'profile',           // route
    history: [],                 // navigation stack
    kidId: null,
    points: 250,
    xp: 1200,
    level: 4,
    streak: 12,
    parentMode: false,
    activeTask: null,
    activeReward: null,
    lastEarned: 0,
    pendingPopup: null,          // 'bonus' | 'demerit' | 'levelup' | null
    tasks: [
      { id: 't1', title: 'Brush Teeth',     window: 'Morning', pts: 5,  state: 'done',      icon: '🦷' },
      { id: 't2', title: 'Make My Bed',     window: 'Morning', pts: 5,  state: 'done',      icon: '🛏️' },
      { id: 't3', title: 'Reading 20 min',  window: 'Anytime', pts: 15, state: 'available', icon: '📖' },
      { id: 't4', title: 'Feed the Dog',    window: 'Evening', pts: 10, state: 'available', icon: '🐶' },
      { id: 't5', title: 'Brush Teeth',     window: 'Evening', pts: 5,  state: 'locked',    icon: '🦷' },
      { id: 't6', title: 'Tidy My Room',    window: 'Evening', pts: 20, state: 'locked',    icon: '🧸' },
    ],
    rewards: [
      { id: 'r1', title: 'Ice Cream',     cost: 100, icon: '🍦', color: '__primary' },
      { id: 'r2', title: 'Movie Night',   cost: 200, icon: '🎬', color: '__cool'    },
      { id: 'r3', title: 'New Lego Set',  cost: 500, icon: '🧱', color: '__warm'    },
      { id: 'r4', title: 'Pizza Friday',  cost: 150, icon: '🍕', color: '__accent'  },
      { id: 'r5', title: 'Bowling Trip',  cost: 600, icon: '🎳', color: '__secondary'},
      { id: 'r6', title: 'Sleepover',     cost: 800, icon: '🏕️', color: '__purple'  },
    ],
  };
}

function LivePrototype() {
  const [t, setTweak] = useTweaks(/*EDITMODE-BEGIN*/{
    "themeId": "candy",
    "soundOn": true,
    "audience": "child"
  }/*EDITMODE-END*/);

  const theme = THEMES[t.themeId] || THEMES.candy;
  const soundOn = !!t.soundOn;

  const [s, setS] = useState(makeInitialState);

  // ─── nav helpers ───
  const go = (screen, patch = {}) => setS(p => ({
    ...p,
    history: [...p.history, p.screen],
    screen,
    ...patch,
  }));
  const back = () => setS(p => {
    if (!p.history.length) return p;
    const h = p.history.slice(0, -1);
    return { ...p, history: h, screen: p.history[p.history.length - 1] };
  });
  const reset = () => setS(makeInitialState());

  // ─── actions ───
  const completeTask = (taskId) => setS(p => {
    const task = p.tasks.find(x => x.id === taskId);
    if (!task || task.state !== 'available') return p;
    const newPoints = p.points + task.pts;
    const newXp = p.xp + task.pts;
    const newLevel = newXp >= 1500 ? 5 : p.level;
    return {
      ...p,
      tasks: p.tasks.map(x => x.id === taskId ? { ...x, state: 'done' } : x),
      points: newPoints,
      xp: newXp,
      level: newLevel,
      lastEarned: task.pts,
      pendingPopup: newLevel > p.level ? 'levelup' : null,
      screen: 'celebration',
      history: [...p.history, p.screen],
    };
  });
  const redeemReward = (rewardId) => setS(p => {
    const r = p.rewards.find(x => x.id === rewardId);
    if (!r || p.points < r.cost) return p;
    return {
      ...p,
      points: p.points - r.cost,
      screen: 'redeemed',
      history: [...p.history, p.screen],
      activeReward: r,
    };
  });

  // Audience switch (kid ↔ parent) maps to root screen
  useEffect(() => {
    if (t.audience === 'parent' && !s.parentMode) {
      setS(p => ({ ...p, parentMode: true, screen: 'parent_dash', history: [] }));
    } else if (t.audience === 'child' && s.parentMode) {
      setS(p => ({ ...p, parentMode: false, screen: 'profile', history: [] }));
    }
  }, [t.audience]);

  const ctx = { s, setS, theme, soundOn, go, back, reset, completeTask, redeemReward };

  return (
    <div style={{
      minHeight: '100vh', width: '100vw', background: '#1a1430',
      fontFamily: TOK.font.body,
      backgroundImage: `radial-gradient(circle at 20% 20%, ${theme.primary}22, transparent 50%), radial-gradient(circle at 80% 80%, ${theme.cool}22, transparent 50%)`,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: '40px 20px', position: 'relative', overflow: 'auto',
    }}>
      {/* Left: nav hints */}
      <SideHints ctx={ctx} />

      {/* Center: phone */}
      <div style={{ position: 'relative' }}>
        <Screen ctx={ctx}/>
      </div>

      {/* Right: prototype controls */}
      <SideControls ctx={ctx} tweak={t} setTweak={setTweak}/>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Audience"/>
        <TweakRadio
          label="View as"
          value={t.audience}
          options={['child', 'parent']}
          onChange={(v) => setTweak('audience', v)}
        />
        <TweakSection label="Look"/>
        <TweakColor
          label="Color theme"
          value={[theme.primary, theme.secondary, theme.accent]}
          options={Object.entries(THEMES).map(([id, th]) => [th.primary, th.secondary, th.accent])}
          onChange={(val) => {
            const id = Object.keys(THEMES).find(k => THEMES[k].primary === val[0]) || 'candy';
            setTweak('themeId', id);
          }}
        />
        <div style={{ padding: '4px', display: 'flex', gap: 6, flexWrap: 'wrap',
          fontSize: 10, fontWeight: 700, color: 'rgba(41,38,27,.55)' }}>
          {Object.entries(THEMES).map(([id, th]) => (
            <span key={id} style={{
              padding: '3px 7px', borderRadius: 999,
              background: id === t.themeId ? th.primary : 'rgba(0,0,0,.05)',
              color: id === t.themeId ? '#fff' : 'rgba(41,38,27,.55)',
            }}>{th.name}</span>
          ))}
        </div>
        <TweakSection label="Audio"/>
        <TweakToggle label="Sound badges" value={soundOn} onChange={(v) => setTweak('soundOn', v)}/>
        <TweakSection label="Demo"/>
        <TweakButton label="Trigger bonus popup" onClick={() => go('bonus_popup')}/>
        <TweakButton label="Trigger demerit popup" onClick={() => go('demerit_popup')}/>
        <TweakButton label="Trigger level up" onClick={() => go('levelup')}/>
        <TweakButton label="Reset everything" onClick={reset}/>
      </TweaksPanel>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Screen router
// ─────────────────────────────────────────────────────────────
function Screen({ ctx }) {
  const map = {
    profile:        <LiveProfile ctx={ctx}/>,
    home:           <LiveHome ctx={ctx}/>,
    task_detail:    <LiveTaskDetail ctx={ctx}/>,
    celebration:    <LiveCelebration ctx={ctx}/>,
    selfie:         <SelfieCapture theme={ctx.theme} soundOn={ctx.soundOn}/>,
    rewards:        <LiveRewards ctx={ctx}/>,
    redeem:         <LiveRedeem ctx={ctx}/>,
    redeemed:       <LiveRedeemed ctx={ctx}/>,
    streak:         <LiveStreak ctx={ctx}/>,
    badges:         <LiveBadges ctx={ctx}/>,
    levelup:        <LiveLevelUp ctx={ctx}/>,
    bonus_popup:    <LiveBonusOverlay ctx={ctx}/>,
    demerit_popup:  <LiveDemeritOverlay ctx={ctx}/>,
    // parent
    parent_dash:    <LiveParentDash ctx={ctx}/>,
    parent_task:    <CreateTask theme={ctx.theme} soundOn={ctx.soundOn}/>,
    parent_rewards: <ManageRewards theme={ctx.theme} soundOn={ctx.soundOn}/>,
    parent_kids:    <ManageKids theme={ctx.theme} soundOn={ctx.soundOn}/>,
    parent_bonus:   <BonusComposer theme={ctx.theme} soundOn={ctx.soundOn}/>,
    parent_demerit: <DemeritComposer theme={ctx.theme} soundOn={ctx.soundOn}/>,
  };
  return map[ctx.s.screen] || <LiveHome ctx={ctx}/>;
}

window.LivePrototype = LivePrototype;

// Animated count-up
function PointsCounter({ value }) {
  const [shown, setShown] = useState(value);
  const startRef = useRef(value);
  const valueRef = useRef(value);
  useEffect(() => {
    if (value === valueRef.current) return;
    const start = valueRef.current;
    const delta = value - start;
    const dur = 900;
    const t0 = performance.now();
    let raf;
    const tick = (now) => {
      const k = Math.min(1, (now - t0) / dur);
      const eased = 1 - Math.pow(1 - k, 3);
      setShown(Math.round(start + delta * eased));
      if (k < 1) raf = requestAnimationFrame(tick);
      else valueRef.current = value;
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [value]);
  return <>{shown}</>;
}

// Animated falling confetti pieces
function FallingConfetti({ theme }) {
  const palette = [theme.secondary, theme.accent, theme.cool, '#fff', theme.warm];
  const pieces = Array.from({ length: 36 }, (_, i) => {
    const r = (n) => { const x = Math.sin((i + 1 + n) * 9999.7) * 10000; return x - Math.floor(x); };
    return {
      c: palette[Math.floor(r(0) * palette.length)],
      x: r(1) * 100,
      dur: 1.6 + r(2) * 1.4,
      delay: r(3) * 0.5,
      rot: (r(4) - 0.5) * 720,
      size: 6 + r(5) * 10,
      shape: Math.floor(r(6) * 3),
    };
  });
  return (
    <div style={{ position: 'absolute', inset: 0, pointerEvents: 'none', overflow: 'hidden' }}>
      <style>{`
        @keyframes ji-fall { from { transform: translateY(-40px) rotate(0deg); }
                             to   { transform: translateY(900px) rotate(720deg); } }
      `}</style>
      {pieces.map((p, i) => (
        <div key={i} style={{
          position: 'absolute', left: `${p.x}%`, top: -30,
          width: p.size, height: p.shape === 1 ? p.size * 0.5 : p.size,
          background: p.c,
          borderRadius: p.shape === 2 ? '50%' : 2,
          animation: `ji-fall ${p.dur}s ${p.delay}s linear infinite`,
        }}/>
      ))}
    </div>
  );
}

                color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontFamily: TOK.font.display, fontWeight: 700, fontSize: 13,
              }}>{a.i}</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontFamily: TOK.font.body, fontSize: 13, fontWeight: 700, color: theme.ink }}>{a.t}</div>
                <div style={{ fontFamily: TOK.font.body, fontSize: 11, fontWeight: 700, color: theme.inkSoft }}>{a.s}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </Phone>
  );
}

function ActBtn({ icon, t, theme, color, tc, onClick }) {
  return (
    <button onClick={onClick} style={{
      appearance: 'none', border: 'none', cursor: 'pointer',
      background: color, color: tc || '#fff',
      borderRadius: TOK.radius.md, padding: '12px 14px',
      display: 'flex', alignItems: 'center', gap: 10,

      }}>{icon}</div>
      <span style={{ fontFamily: TOK.font.display, fontSize: 14, fontWeight: 700 }}>{t}</span>
    </button>
  );
}

function LinkRow({ icon, t, theme, onClick }) {
  return (
    <button onClick={onClick} style={{
      appearance: 'none', border: 'none', cursor: 'pointer',
      background: theme.card, padding: '12px 14px',
      borderRadius: TOK.radius.md, boxShadow: '0 2px 0 rgba(42,45,95,0.08)',
      display: 'flex', alignItems: 'center', gap: 10, textAlign: 'left',
      fontFamily: 'inherit',
    }}>
      <span style={{ fontSize: 20 }}>{icon}</span>
      <span style={{ flex: 1, fontFamily: TOK.font.display, fontSize: 14,
        fontWeight: 700, color: theme.ink }}>{t}</span>
      <span style={{ color: theme.inkSoft }}>›</span>

}

  selfie: 'Victory selfie', rewards: 'Rewards vault',

  parent_dash: 'Parent dashboard', parent_task: 'Create task',
  parent_rewards: 'Manage rewards', parent_kids: 'Manage kids',
  parent_bonus: 'Bonus composer', parent_demerit: 'Check-in composer',
};

function SideHints({ ctx }) {
  const { s, theme } = ctx;
  return (
    <div style={{ position: 'absolute', left: 32, top: '50%', transform: 'translateY(-50%)',
      width: 260,
      display: 'flex', flexDirection: 'column', gap: 12, color: '#fff',
      fontFamily: TOK.font.body,
    }}>
      <div style={{
        padding: '10px 14px', borderRadius: 12,
        background: 'rgba(255,255,255,0.06)', backdropFilter: 'blur(10px)',
        border: '1px solid rgba(255,255,255,0.08)',
      }}>
        <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: 1.5,
          textTransform: 'uppercase', opacity: 0.7 }}>You are on</div>
        <div style={{ fontFamily: TOK.font.display, fontSize: 18, fontWeight: 700, marginTop: 4 }}>
          {SCREEN_LABELS[s.screen] || s.screen}
        </div>
      </div>

      <div style={{
        padding: '12px 14px', borderRadius: 12,

        fontSize: 12, lineHeight: 1.5, opacity: 0.8,

        <div style={{ fontWeight: 800, marginBottom: 6, color: theme.secondary }}>👆 Try this:</div>

}

function Hint({ screen }) {
  const tips = {
    profile: <>Tap <b>Emma</b> (or any kid) to enter the app.</>,
    home: <>Tap a <b>Ready!</b> mission — Reading or Feed the Dog.</>,
    task_detail: <>Tap the big <b>COMPLETE!</b> button.</>,
    celebration: <>Watch the points fly! Then tap <b>Keep going</b> or grab a <b>Victory selfie</b>.</>,
    selfie: <>Tap the shutter (or any tab below).</>,
    rewards: <>Tap a reward you can afford (highlighted).</>,
    redeem: <>Tap <b>Claim it!</b> to redeem.</>,
    redeemed: <>This auto-returns to the shop in a moment.</>,
    streak: <>Switch tabs at the bottom.</>,
    badges: <>Check out the Lv 5 upgrade card up top.</>,
    levelup: <>Tap anywhere to return home.</>,
    bonus_popup: <>Tap anywhere — the bonus gets added.</>,
    demerit_popup: <>Tap anywhere — calm, then home.</>,
    parent_dash: <>Try the quick-action grid: New task, Rewards, Give bonus, Check-in.</>,
    parent_task: <>This form mirrors the spec\u2019s task template + schedule.</>,

function SideControls({ ctx, tweak, setTweak }) {
  const { s, theme, back, reset, setS, go } = ctx;
  const isParent = s.parentMode;

  return (
    <div style={{
      position: 'absolute', right: 32, top: '50%', transform: 'translateY(-50%)',
      width: 240,
      display: 'flex', flexDirection: 'column', gap: 10,
      fontFamily: TOK.font.body, color: '#fff',
    }}>
      <div style={{
        padding: '10px 12px', borderRadius: 12,
        background: 'rgba(255,255,255,0.06)', backdropFilter: 'blur(10px)',
        border: '1px solid rgba(255,255,255,0.08)',
      }}>
        <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: 1.5,
          textTransform: 'uppercase', opacity: 0.7 }}>Viewing as</div>
        <div style={{ display: 'flex', gap: 4, marginTop: 6, padding: 3,
          background: 'rgba(0,0,0,0.3)', borderRadius: 999 }}>
          {['child', 'parent'].map(role => {
            const on = (role === 'parent') === isParent;
            return (
              <button key={role}
                onClick={() => setTweak('audience', role)}
                style={{
                  flex: 1, appearance: 'none', border: 'none', cursor: 'pointer',
                  padding: '6px 10px', borderRadius: 999,
                  background: on ? theme.primary : 'transparent',
                  color: on ? '#fff' : 'rgba(255,255,255,0.6)',
                  fontFamily: 'inherit', fontSize: 12, fontWeight: 800,
                  textTransform: 'capitalize',
                }}>{role}</button>
            );
          })}
        </div>
      </div>

      <CtrlBtn onClick={back} disabled={!s.history.length}>↶ Back</CtrlBtn>
      <CtrlBtn onClick={reset}>↻ Reset prototype</CtrlBtn>

      <div style={{ height: 1, background: 'rgba(255,255,255,0.1)', margin: '4px 0' }}/>

      <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: 1.5,
        textTransform: 'uppercase', opacity: 0.5, padding: '0 4px' }}>Jump to</div>

      {isParent ? (
        <>
          <CtrlBtn onClick={() => setS(p => ({ ...p, screen: 'parent_dash', history: [] }))}>Dashboard</CtrlBtn>
          <CtrlBtn onClick={() => go('parent_task')}>Create task</CtrlBtn>
          <CtrlBtn onClick={() => go('parent_rewards')}>Manage rewards</CtrlBtn>
          <CtrlBtn onClick={() => go('parent_kids')}>Manage kids</CtrlBtn>
          <CtrlBtn onClick={() => go('parent_bonus')}>Give bonus</CtrlBtn>
          <CtrlBtn onClick={() => go('parent_demerit')}>Add check-in</CtrlBtn>
        </>
      ) : (
        <>
          <CtrlBtn onClick={() => setS(p => ({ ...p, screen: 'profile', history: [] }))}>Profile picker</CtrlBtn>
          <CtrlBtn onClick={() => setS(p => ({ ...p, screen: 'home', history: [] }))}>Mission home</CtrlBtn>
          <CtrlBtn onClick={() => setS(p => ({ ...p, screen: 'rewards', history: [] }))}>Rewards</CtrlBtn>
          <CtrlBtn onClick={() => setS(p => ({ ...p, screen: 'streak', history: [] }))}>Streak</CtrlBtn>
          <CtrlBtn onClick={() => setS(p => ({ ...p, screen: 'badges', history: [] }))}>Trophies</CtrlBtn>
          <CtrlBtn onClick={() => go('bonus_popup')}>💥 Bonus popup</CtrlBtn>
          <CtrlBtn onClick={() => go('demerit_popup')}>○ Check-in popup</CtrlBtn>
          <CtrlBtn onClick={() => go('levelup')}>⬆ Level up</CtrlBtn>
        </>
      )}
    </div>
  );
}

function CtrlBtn({ children, onClick, disabled }) {
  return (
    <button onClick={onClick} disabled={disabled} style={{
      appearance: 'none', border: 'none', cursor: disabled ? 'not-allowed' : 'pointer',
      padding: '8px 12px', borderRadius: 8,
      background: 'rgba(255,255,255,0.06)',
      color: '#fff', fontFamily: 'inherit', fontSize: 12, fontWeight: 700,
      textAlign: 'left', opacity: disabled ? 0.4 : 1,
      border: '1px solid rgba(255,255,255,0.08)',
      transition: 'background 120ms',
    }}
    onMouseEnter={(e) => !disabled && (e.currentTarget.style.background = 'rgba(255,255,255,0.12)')}
    onMouseLeave={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,0.06)')}>
      {children}
    </button>
  );
}
