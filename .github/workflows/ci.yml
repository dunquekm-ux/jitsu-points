name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # ── Job 1: quality gates ────────────────────────────────────────────────────
  check:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        env:
          VITE_BUILD_NUMBER: ${{ github.run_number }}
          VITE_WORKER_URL: ${{ secrets.VITE_WORKER_URL }}
        run: npm run build

      # Upload the dist/ folder so the deploy job can use it without rebuilding
      - name: Upload build artifact
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: app/dist
          retention-days: 1

  # ── Job 2: deploy (master push only) ───────────────────────────────────────
  deploy:
    name: Deploy to Cloudflare Pages
    needs: check
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=jitsu-points --commit-dirty=true

      - name: Smoke-test live URL
        run: |
          echo "⏳ Waiting 15s for CDN propagation..."
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://jitsu-points.pages.dev)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Live URL returned $STATUS — deployment may have failed"
            exit 1
          fi
          echo "✅ jitsu-points.pages.dev is up and returning 200"
